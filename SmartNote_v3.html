<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563C0">
<title>스마트 노트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563C0;--bl:#EEF3FC;--bm:#C5D8F8;--bd:#1A4FA0;
  --bg:#F4F6FB;--card:#fff;--border:#E4E8F0;
  --text:#111;--t2:#555;--t3:#9AA;--danger:#E04444;
  --hh:54px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR','Apple SD Gothic Neo','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}

.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:scIn .18s ease}
.screen-back{animation:scBack .18s ease}
@keyframes scIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes scBack{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}

/* ── Header ── */
.hdr{background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;padding:0 6px;padding-top:var(--st);height:calc(var(--hh)+var(--st));flex-shrink:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.hdr-center{flex:1;min-width:0;padding:0 4px}
.hdr-title{font-size:16px;font-weight:700;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-sub{font-size:11px;color:var(--t3);margin-top:1px}
.icon-btn{width:44px;height:44px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--t2);flex-shrink:0;transition:background .12s}
.icon-btn:active{background:#F0F0F0}

/* ── Breadcrumb ── */
.breadcrumb{background:#fff;border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;flex-wrap:nowrap;overflow-x:auto;gap:0;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.breadcrumb::-webkit-scrollbar{display:none}
.bc-btn{background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;color:var(--blue);padding:4px 6px;border-radius:6px;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
.bc-btn:active{background:var(--bl)}
.bc-sep{font-size:11px;color:#ccc;margin:0 2px}
.bc-cur{font-size:12px;color:var(--t2);font-weight:700;padding:4px 6px;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.depth-badge{background:var(--blue);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:2px 8px;margin-left:6px;flex-shrink:0}

/* ── Home ── */
.home-search{background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;flex-shrink:0}
.search-row{display:flex;align-items:center;gap:8px;background:#F0F4FF;border-radius:22px;padding:9px 14px}
.search-row input{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:inherit;color:#111}
.note-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:600px){.note-grid{grid-template-columns:repeat(3,1fr)}}
.note-card{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:13px;cursor:pointer;display:flex;flex-direction:column;gap:6px;min-height:108px;-webkit-user-select:none;transition:box-shadow .15s}
.note-card:active{box-shadow:0 0 0 2px var(--blue)}
.nc-bar{width:100%;height:4px;border-radius:2px;margin-bottom:2px}
.nc-title{font-size:14px;font-weight:700;color:#111;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.nc-tag{font-size:10px;background:var(--bl);color:var(--blue);border-radius:4px;padding:2px 7px;border:1px solid var(--bm);white-space:nowrap;display:inline-block}
.nc-meta{font-size:10px;color:var(--t3);margin-top:auto}
.del-btn{background:none;border:none;cursor:pointer;color:#ddd;padding:6px;border-radius:6px;flex-shrink:0}
.del-btn:active{color:var(--danger);background:#FFF0F0}

/* ── Scroll / divider / tip ── */
.scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 14px calc(80px + var(--sb))}
.note-title-input{width:100%;border:none;background:transparent;font-family:inherit;font-size:21px;font-weight:700;color:#111;padding:4px 0 8px;outline:none;border-bottom:2px solid var(--blue);caret-color:var(--blue)}
.note-title-view{font-size:21px;font-weight:700;color:#111;line-height:1.35;padding:2px 0 8px}
.note-meta{font-size:11px;color:var(--t3);margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:14px 0}
.tip{font-size:12px;color:var(--blue);background:var(--bl);border-radius:8px;padding:8px 12px;margin-bottom:10px;border-left:3px solid var(--blue);line-height:1.6}
.body-textarea{width:100%;border:none;background:transparent;font-family:inherit;font-size:16px;line-height:2.1;color:#222;resize:none;min-height:180px;outline:none;caret-color:var(--blue);-webkit-appearance:none;overflow:hidden}

/* ── Linked items ── */
.line-item{display:flex;align-items:center;min-height:50px;padding:2px 0}
.line-num{font-size:13px;font-weight:600;color:#bbb;min-width:26px;flex-shrink:0}
.line-link{flex:1;display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:16px;text-align:left;padding:10px;border-radius:10px;color:var(--blue);font-weight:500;transition:background .12s;-webkit-user-select:none;width:100%}
.line-link:active{background:var(--bl)}
.link-text{border-bottom:1.5px dashed var(--bm);padding-bottom:1px;flex:1}
.link-text.has-sub{border-bottom-style:solid;border-bottom-color:var(--blue);font-weight:700}
.sub-badge{font-size:10px;background:var(--bl);color:var(--blue);border-radius:5px;padding:3px 8px;border:1px solid var(--bm);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px}
.sub-badge.deep{background:#FFF3E0;color:#E65100;border-color:#FFCC80}
.line-plain{font-size:15px;color:var(--t2);line-height:1.8;padding:3px 0}
.sub-list-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:7px;-webkit-user-select:none}
.sub-list-item:active{border-color:var(--blue);background:var(--bl)}
.sli-num{width:28px;height:28px;border-radius:8px;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--blue);flex-shrink:0}

/* ── Tab bar ── */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;height:48px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--t3);border-bottom:3px solid transparent;display:flex;align-items:center;justify-content:center;gap:4px;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn:active{background:#F5F7FF}

/* ═══════════════════════════
   PEN TOOLBAR — 2 rows
═══════════════════════════ */
.pen-tab-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pen-toolbar{background:#F7F9FF;border-bottom:1px solid var(--border);flex-shrink:0;padding:0}

/* row 1: colors + size */
.pen-row1{display:flex;align-items:center;gap:6px;padding:8px 10px 6px;flex-wrap:wrap}
.pen-color{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s;flex-shrink:0}
.pen-color.active{border-color:#fff;box-shadow:0 0 0 2.5px var(--blue);transform:scale(1.18)}
.pen-size-wrap{display:flex;align-items:center;gap:5px;margin-left:auto}
.pen-size-lbl{font-size:11px;color:var(--t3);white-space:nowrap}
#pen-size{width:80px;accent-color:var(--blue)}

/* row 2: tools */
.pen-row2{display:flex;align-items:center;gap:5px;padding:0 8px 8px;overflow-x:auto;scrollbar-width:none}
.pen-row2::-webkit-scrollbar{display:none}
.pen-tool{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:4px;flex-shrink:0;transition:all .12s;white-space:nowrap}
.pen-tool:active,.pen-tool.on{background:var(--bl);border-color:var(--blue);color:var(--blue)}

/* ── 펜 타입 선택 row ── */
.pen-row0{display:flex;align-items:center;gap:5px;padding:7px 8px 0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);padding-bottom:7px}
.pen-row0::-webkit-scrollbar{display:none}
.pen-type-btn{
  height:52px;min-width:52px;padding:0 8px;
  border:2px solid var(--border);border-radius:10px;
  background:#fff;cursor:pointer;font-family:inherit;
  font-size:10px;font-weight:700;color:var(--t2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;flex-shrink:0;transition:all .15s;
  -webkit-user-select:none;
}
.pen-type-btn .pt-preview{width:36px;height:12px;border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pen-type-btn.active{border-color:var(--blue);background:var(--bl);color:var(--blue)}
.pen-type-btn:active{transform:scale(.95)}

/* ── 손가락 그리기 토글 ── */
.finger-toggle{
  height:32px;padding:0 12px;
  border-radius:16px;cursor:pointer;font-family:inherit;
  font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;
  flex-shrink:0;transition:all .2s;border:1.5px solid;white-space:nowrap;
}
.finger-toggle.off{background:#fff;border-color:var(--border);color:var(--t3)}
.finger-toggle.on{background:#10B981;border-color:#059669;color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.4)}

/* ── 디자인 선택 버튼 ── */
.design-pick-btn{
  height:32px;padding:0 10px;border:1.5px solid var(--blue);border-radius:8px;
  background:var(--bl);cursor:pointer;font-family:inherit;font-size:12px;
  font-weight:700;color:var(--blue);display:flex;align-items:center;gap:4px;
  flex-shrink:0;white-space:nowrap;transition:all .15s;
}
.design-pick-btn:active{background:var(--bm)}

/* ── Canvas ── */
.canvas-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;background:#FAFCFF}
.canvas-virtual{position:relative;width:100%}
#pen-canvas{display:block;width:100%;position:absolute;top:0;left:0;touch-action:none;cursor:crosshair}
.canvas-expand-btn{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 3px 12px rgba(37,99,192,.4);z-index:10}
.pen-status{background:#F7F9FF;border-top:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;font-size:11px;color:var(--t3)}
.pen-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.pen-dot.on{background:#10B981;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Text tab ── */
.text-tab-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.text-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 14px calc(24px + var(--sb))}
.infinite-textarea{width:100%;border:none;background:transparent;font-family:inherit;font-size:17px;line-height:2.2;color:#222;resize:none;outline:none;caret-color:var(--blue);-webkit-appearance:none;min-height:calc(100vh - 200px);height:auto;overflow:hidden;padding-bottom:100px}
.memo-view-wrap{background:transparent;font-size:17px;line-height:2.2;color:#333;white-space:pre-wrap;word-break:break-word;min-height:calc(100vh - 200px);padding-bottom:100px}
.memo-view-wrap.empty{color:var(--t3);font-style:italic;font-size:15px}
.text-counter{flex-shrink:0;background:#fff;border-top:1px solid var(--border);padding:6px 14px;font-size:11px;color:var(--t3);display:flex;align-items:center;gap:10px}

/* ── Section ── */
.sub-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 14px calc(70px + var(--sb))}
.sub-main-title{font-size:22px;font-weight:900;color:#111;line-height:1.3;margin-bottom:3px}
.sub-depth-label{font-size:11px;color:var(--t3);margin-bottom:14px}
.sec-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.sec-hdr{background:#F7F9FF;border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center}
.sec-hdr-title{flex:1;font-size:14px;font-weight:700;color:#333}
.sec-ta{width:100%;border:none;padding:14px;font-size:15px;line-height:1.9;font-family:inherit;resize:none;min-height:110px;color:#333;background:transparent;outline:none;display:block;caret-color:var(--blue);-webkit-appearance:none;overflow:hidden}
.add-sec-btn{width:100%;background:#F7F9FF;border:1.5px dashed var(--border);border-radius:12px;color:var(--t3);cursor:pointer;font-family:inherit;font-size:14px;padding:15px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-user-select:none}
.add-sec-btn:active{background:var(--bl);border-color:var(--blue);color:var(--blue)}
.expand-body-textarea{width:100%;border:none;background:transparent;font-family:inherit;font-size:16px;line-height:2.1;color:#222;resize:none;outline:none;caret-color:var(--blue);-webkit-appearance:none;min-height:200px;overflow:hidden}

/* ── FAB / Buttons ── */
.fab{position:fixed;bottom:calc(22px + var(--sb));right:18px;width:56px;height:56px;background:var(--blue);color:#fff;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,99,192,.45);cursor:pointer;z-index:50;transition:transform .15s}
.fab:active{transform:scale(.9)}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;border-radius:10px;height:46px;transition:opacity .12s,transform .1s;-webkit-user-select:none;padding:0 16px}
.btn:active{opacity:.75;transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff;flex:1}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border);flex:1}
.btn-danger{background:var(--danger);color:#fff;flex:1}
.row-btns{display:flex;gap:10px;margin-top:12px}

/* ═══════════════════════════
   DESIGN PICKER MODAL
═══════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;animation:fadein .15s}
.sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;padding:20px 16px calc(20px + var(--sb));animation:slideup .2s ease;max-height:90vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.field-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-size:15px;font-family:inherit;outline:none;background:#fff;color:#111;caret-color:var(--blue);-webkit-appearance:none}
.field-input:focus{border-color:var(--blue)}

/* Design grid */
.design-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
@media(min-width:480px){.design-grid{grid-template-columns:repeat(4,1fr)}}
.design-item{border-radius:12px;border:2px solid var(--border);cursor:pointer;overflow:hidden;transition:all .15s;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:stretch}
.design-item.active{border-color:var(--blue);box-shadow:0 0 0 2px var(--bl)}
.design-item:active{transform:scale(.96)}
.design-preview{flex:1;position:relative;overflow:hidden}
.design-label{font-size:11px;font-weight:700;text-align:center;padding:5px 4px;background:#F7F9FF;color:var(--t2)}
.design-item.active .design-label{background:var(--bl);color:var(--blue)}

/* Text design options */
.text-design-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.text-design-item{border-radius:12px;border:2px solid var(--border);cursor:pointer;overflow:hidden;padding:14px;transition:all .15s}
.text-design-item.active{border-color:var(--blue);background:var(--bl)}
.text-design-item:active{transform:scale(.97)}
.tdi-name{font-size:13px;font-weight:700;color:#333;margin-bottom:4px}
.tdi-preview{font-size:12px;color:var(--t3);line-height:1.8}

/* S Pen tip */
.spen-tip{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:rgba(37,99,192,.92);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;pointer-events:none;display:none;white-space:nowrap}

/* Finger mode banner */
.finger-banner{background:linear-gradient(90deg,#10B981,#059669);color:#fff;font-size:12px;font-weight:600;padding:5px 14px;display:flex;align-items:center;gap:6px;flex-shrink:0;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:translateY(0)}}

.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-ico{font-size:48px;margin-bottom:12px;opacity:.4}

svg{display:block}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(90px + var(--sb));left:50%;transform:translateX(-50%);background:rgba(20,20,20,.93);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:400;pointer-events:none;white-space:nowrap;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Samsung Notes Sheet ── */
.samsung-item{width:100%;background:#F8F9FF;border:1.5px solid var(--border);border-radius:13px;padding:13px 14px;display:flex;align-items:center;gap:13px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.samsung-item:active{background:var(--bl);border-color:var(--blue)}
.si-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.si-title{font-size:14px;font-weight:700;color:#111;margin-bottom:2px}
.si-desc{font-size:11px;color:var(--t3);line-height:1.5}
.sn-hdr-btn{height:34px;padding:0 10px;border:1.5px solid #C5D8F8;border-radius:8px;background:var(--bl);cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:4px;flex-shrink:0;white-space:nowrap;transition:all .15s}
.sn-hdr-btn:active{background:var(--bm)}
</style>
</head>
<body>
<div id="app"></div>
<div class="spen-tip" id="spen-tip">✏️ S펜 감지됨 — 필압 활성</div>

<script>
// ════════════════════════════
//  CONSTANTS
// ════════════════════════════
const SK='snote-v6';
const COLORS=['#1A1A2E','#2563C0','#1a7a5e','#C0392B','#7D3C98','#E67E22','#888'];
const CANVAS_INIT_H=2400;
const CANVAS_EXPAND=1200;

// ── Canvas background designs ──
const CANVAS_DESIGNS={
  plain:   {name:'백지',    bg:'#FFFFFF', draw:(ctx,w,h)=>{}},
  lined:   {name:'줄 노트',  bg:'#FFFEF8', draw:(ctx,w,h)=>{ctx.strokeStyle='#DDEEFF';ctx.lineWidth=1;for(let y=40;y<h;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}}},
  grid:    {name:'격자',    bg:'#FAFCFF', draw:(ctx,w,h)=>{ctx.strokeStyle='#E4EEFF';ctx.lineWidth=1;for(let x=32;x<w;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}for(let y=32;y<h;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}}},
  dotgrid: {name:'점 격자',  bg:'#FFFFFE', draw:(ctx,w,h)=>{ctx.fillStyle='#C5D8F8';for(let x=28;x<w;x+=28)for(let y=28;y<h;y+=28){ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();}}},

    draw(ctx,p1,p2,color,size,pressure){

        const sx=cx+Math.cos(a)*d;
        const sy=cy+Math.sin(a)*d;

    draw(ctx,p1,p2,color,size,pressure){
      const dx=p2.x-p1.x, dy=p2.y-p1.y;
      const angle=Math.atan2(dy,dx);
      const w=size*(2+pressure*1.5);
      const h=size*(0.15+pressure*0.3);
      ctx.globalAlpha=0.88;
      ctx.fillStyle=color;
      ctx.save();
      ctx.translate((p1.x+p2.x)/2,(p1.y+p2.y)/2);
      ctx.rotate(angle+Math.PI/4);
      const len=Math.hypot(dx,dy)+1;
      ctx.fillRect(-len/2,-h/2,len,h);
      ctx.fillRect(-h/2,-w/2,h,w);

  const W=scrollEl.clientWidth;
  const designKey=DATA.settings.canvasDesign||'lined';

  PEN.canvasH=node?.canvasH||CANVAS_INIT_H;
  PEN.paths=node?.strokes?JSON.parse(JSON.stringify(node.strokes)):[];

  virtual.style.height=PEN.canvasH+'px';
  virtual.style.width='100%';
  canvas.width=Math.round(W*dpr);
  canvas.height=Math.round(PEN.canvasH*dpr);
  canvas.style.width=W+'px';
  canvas.style.height=PEN.canvasH+'px';

  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.lineCap='round'; ctx.lineJoin='round';

  if(PEN.scrollY) scrollEl.scrollTop=PEN.scrollY;
  redrawAll(ctx,W,dpr,designKey);

  // ══════════════════════════════════════
  //  입력 엔진 완전 재설계
  //  · canvas touch-action:none 고정 → 포인터이벤트 100% 수신
  //  · scroll: JS 직접 처리 (scrollEl touch-action:none)
  //  · 팜리젝션: S펜 감지 중 touch 차단
  //  · 손가락ON: touch→그리기 / 손가락OFF: touch→수동스크롤
  // ══════════════════════════════════════
  scrollEl.style.touchAction='none';
  scrollEl.style.overscrollBehavior='none';

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/dpr/r.width, sy=canvas.height/dpr/r.height;
    return{x:(e.clientX-r.left)*sx, y:(e.clientY-r.top)*sy};
  }
  function normPressure(raw){
    const s=PEN.sensitivity||3, p=Math.max(raw,0.03);
    return Math.min(1,Math.pow(p,1.5/s));
  }

  // 팜 리젝션 상태
  let _activePointerId=null, _penOnScreen=false, _penTimer=null;
  function setPenOn(){
    _penOnScreen=true;
    if(_penTimer){clearTimeout(_penTimer);_penTimer=null;}
  }
  function setPenOff(){
    if(_penTimer) clearTimeout(_penTimer);
    _penTimer=setTimeout(()=>{_penOnScreen=false;_penTimer=null;},150);
  }

  // 스무딩 버퍼
  let _buf=[];
  function drawSmooth(){
    if(_buf.length<2)return;
    const a=_buf[_buf.length-2],b=_buf[_buf.length-1];
    const pt=PEN_TYPES[PEN.penType]||PEN_TYPES.ballpoint;
    ctx.save();pt.draw(ctx,a,b,PEN.color,PEN.size,b.p);ctx.restore();
  }

  // ── 포인터 이벤트 (S펜 + 손가락 그리기) ──
  canvas.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(e.pointerType==='pen'){setPenOn();detectSPen();}
    // 팜/멀티 차단
    if(e.pointerType==='touch'&&_penOnScreen) return;
    if(_activePointerId!==null&&e.pointerId!==_activePointerId) return;
    // 그리기 가능 여부
    const canDraw=(e.pointerType==='pen'||e.pointerType==='mouse')||(e.pointerType==='touch'&&PEN.fingerMode);
    if(!canDraw) return;
    canvas.setPointerCapture(e.pointerId);
    _activePointerId=e.pointerId;
    const p=getPos(e),pr=normPressure(e.pressure||0.5);
    if(PEN.eraseMode){eraseAt(p,ctx,W,dpr,designKey);return;}
    PEN.drawing=true;
    _buf=[{...p,p:pr}];
    PEN.cur={color:PEN.color,size:PEN.size,penType:PEN.penType,points:[{...p,p:pr}]};
    const pt=PEN_TYPES[PEN.penType]||PEN_TYPES.ballpoint;
    ctx.save();pt.draw(ctx,p,p,PEN.color,PEN.size,pr);ctx.restore();
    checkAutoExpand(p.y,ctx,W,dpr,virtual,canvas,scrollEl,designKey);
  },{passive:false});

  canvas.addEventListener('pointermove',e=>{
    e.preventDefault();
    if(e.pointerType==='pen') setPenOn();
    if(!PEN.drawing||e.pointerId!==_activePointerId) return;
    const p=getPos(e),pr=normPressure(e.pressure||0.5);
    if(PEN.eraseMode){eraseAt(p,ctx,W,dpr,designKey);return;}
    PEN.cur.points.push({...p,p:pr});
    _buf.push({...p,p:pr});
    drawSmooth();
    if(_buf.length>6)_buf=_buf.slice(-3);
    checkAutoExpand(p.y,ctx,W,dpr,virtual,canvas,scrollEl,designKey);
  },{passive:false});

  canvas.addEventListener('pointerup',e=>{
    e.preventDefault();
    if(e.pointerType==='pen') setPenOff();
    if(e.pointerId!==_activePointerId) return;
    if(PEN.drawing&&PEN.cur){drawSmooth();PEN.paths.push(PEN.cur);saveStrokes();}
    PEN.drawing=false;PEN.cur=null;_buf=[];_activePointerId=null;
  },{passive:false});

  canvas.addEventListener('pointercancel',e=>{
    if(e.pointerType==='pen') setPenOff();
    if(e.pointerId!==_activePointerId) return;
    if(PEN.drawing&&PEN.cur){PEN.paths.push(PEN.cur);saveStrokes();}
    PEN.drawing=false;PEN.cur=null;_buf=[];_activePointerId=null;
  });
  canvas.addEventListener('pointerleave',e=>{if(e.pointerType==='pen')setPenOff();});

  // ── 손가락 OFF 전용 수동 스크롤 ──
  // touch-action:none이므로 브라우저 스크롤 불가 → JS로 직접 처리
  let _tY=null,_tTop=null;
  scrollEl.addEventListener('touchstart',e=>{
    if(_penOnScreen||PEN.fingerMode||e.touches.length!==1) return;
    _tY=e.touches[0].clientY; _tTop=scrollEl.scrollTop;
  },{passive:true});
  scrollEl.addEventListener('touchmove',e=>{
    if(_penOnScreen||PEN.fingerMode||_tY===null||e.touches.length!==1) return;
    scrollEl.scrollTop=_tTop+(_tY-e.touches[0].clientY);
  },{passive:true});
  scrollEl.addEventListener('touchend',()=>{_tY=null;_tTop=null;},{passive:true});
  scrollEl.addEventListener('scroll',()=>{PEN.scrollY=scrollEl.scrollTop;},{passive:true});

  // ── 펜 타입 선택 ──
  $$('[data-ptype]').forEach(btn=>btn.addEventListener('click',()=>{
    PEN.penType=btn.dataset.ptype;
    PEN.eraseMode=false;
    $$('[data-ptype]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    $('#btn-eraser')?.classList.remove('on');
  }));

  // ── 색상 선택 ──
  $$('[data-color]').forEach(el=>el.addEventListener('click',()=>{
    PEN.color=el.dataset.color; PEN.eraseMode=false;
    $$('[data-color]').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
    $('#btn-eraser')?.classList.remove('on');
  }));
  $('#btn-eraser')?.addEventListener('click',()=>{PEN.eraseMode=!PEN.eraseMode;$('#btn-eraser')?.classList.toggle('on',PEN.eraseMode);});
  $('#pen-size')?.addEventListener('input',e=>{PEN.size=+e.target.value;});
  $('#btn-undo')?.addEventListener('click',()=>{if(PEN.paths.length){PEN.paths.pop();redrawAll(ctx,W,dpr,designKey);saveStrokes();}});
  $('#btn-clear-all')?.addEventListener('click',()=>{
    showConfirm('전체 필기를 지울까요?',()=>{PEN.paths=[];drawDesignBg(ctx,W,PEN.canvasH,designKey);saveStrokes();});
  });
  $('#btn-canvas-expand')?.addEventListener('click',()=>expandCanvas(ctx,W,dpr,virtual,canvas,scrollEl,designKey,true));

  // ── 감도 슬라이더 ──
  $('#pen-sensitivity')?.addEventListener('input',e=>{
    PEN.sensitivity=+e.target.value;
    const lbl=$('#sens-lbl');
    if(lbl) lbl.textContent=PEN.sensitivity;
  });

  // ── 손가락 그리기 토글 ──
  $('#btn-finger')?.addEventListener('click',()=>{
    PEN.fingerMode=!PEN.fingerMode;
    const btn=$('#btn-finger');
    btn.className='finger-toggle '+(PEN.fingerMode?'on':'off');
    btn.innerHTML=PEN.fingerMode?`${I.hand} 손가락 ON`:`${I.hand} 손가락 OFF`;
    // canvas touch-action
    canvas.style.touchAction=PEN.fingerMode?'none':'pan-y';
    scrollEl.style.touchAction=PEN.fingerMode?'none':'auto';
    // banner
    const banner=$('#finger-banner');
    if(banner) banner.style.display=PEN.fingerMode?'flex':'none';
  });

  // ── 디자인 선택 ──
  $('#btn-design')?.addEventListener('click',()=>showCanvasDesignPicker(ctx,W,dpr,virtual,canvas,scrollEl));
}

function checkAutoExpand(y,ctx,W,dpr,virtual,canvas,scrollEl,dk){
  if(y>PEN.canvasH-150) expandCanvas(ctx,W,dpr,virtual,canvas,scrollEl,dk,false);
}
function expandCanvas(ctx,W,dpr,virtual,canvas,scrollEl,dk,scrollTo){
  const prevH=PEN.canvasH;
  PEN.canvasH+=CANVAS_EXPAND;
  const imageData=ctx.getImageData(0,0,Math.round(W*dpr),Math.round(prevH*dpr));
  canvas.height=Math.round(PEN.canvasH*dpr);
  canvas.style.height=PEN.canvasH+'px';
  virtual.style.height=PEN.canvasH+'px';
  ctx.scale(dpr,dpr);
  ctx.putImageData(imageData,0,0);
  // draw new bg area
  ctx.save();
  ctx.beginPath();ctx.rect(0,prevH,W,PEN.canvasH-prevH);ctx.clip();
  drawDesignBg(ctx,W,PEN.canvasH,dk);
  ctx.restore();
  ctx.lineCap='round'; ctx.lineJoin='round';
  const nd=DATA.nodes[SCREEN.nodeKey];
  if(nd){nd.canvasH=PEN.canvasH;persist();}
  if(scrollTo) setTimeout(()=>scrollEl.scrollTo({top:prevH-80,behavior:'smooth'}),50);
  // update counter
  const ctr=$('#canvas-page-count');
  if(ctr) ctr.textContent=`${Math.round(PEN.canvasH/100)}페이지`;
}
function redrawAll(ctx,W,dpr,designKey){
  ctx.clearRect(0,0,W,PEN.canvasH);
  drawDesignBg(ctx,W,PEN.canvasH,designKey);
  PEN.paths.forEach(path=>{
    if(!path.points?.length)return;
    const pt=PEN_TYPES[path.penType||'ballpoint']||PEN_TYPES.ballpoint;
    for(let i=1;i<path.points.length;i++){
      const p=path.points[i],pv=path.points[i-1];
      ctx.save();
      pt.draw(ctx,pv,p,path.color,path.size,p.p||0.5);
      ctx.restore();
    }
  });
}
function eraseAt(pos,ctx,W,dpr,dk){
  const r=22;
  PEN.paths=PEN.paths.filter(p=>!p.points?.some(q=>Math.hypot(q.x-pos.x,q.y-pos.y)<r));
  redrawAll(ctx,W,dpr,dk);
}
function saveStrokes(){
  const nd=DATA.nodes[SCREEN.nodeKey];
  if(nd){nd.strokes=PEN.paths.map(p=>({...p,points:[...p.points]}));persist();}
}
let _sPenShown=false;
function detectSPen(){
  PEN.sPen=true;
  const dot=$('#pen-dot'),txt=$('#pen-status-txt');
  if(dot)dot.classList.add('on');
  if(txt)txt.textContent='S펜 연결됨 · 필압 감지 활성';
  if(!_sPenShown){_sPenShown=true;const t=$('#spen-tip');if(t){t.style.display='block';setTimeout(()=>t.style.display='none',2500);}}
}

// ════════════════════════════
//  AUTO RESIZE TEXTAREA
// ════════════════════════════
function autoResize(ta){if(!ta)return;ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function initAutoResize(){
  const ta=$('.infinite-textarea');if(!ta)return;
  autoResize(ta);
  ta.addEventListener('input',()=>{autoResize(ta);updateCounter(ta);});
}
function updateCounter(ta){
  const c=ta.value.length,w=ta.value.trim()?ta.value.trim().split(/\s+/).length:0,l=ta.value.split('\n').length;
  const el=$('#text-counter');if(el)el.textContent=`${c.toLocaleString()}자 · ${w.toLocaleString()}단어 · ${l}줄`;
}
function initSecAutoResize(){
  $$('.sec-ta,.expand-body-textarea,.body-textarea').forEach(ta=>{
    ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px';
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  });
}

function render(){
  const app=$('#app');
  const cls=GOING_BACK?'screen screen-back':'screen';
  let html='';
  if(SCREEN.name==='home') html=renderHome();
  else if(SCREEN.name==='note') html=renderNote();
  else if(SCREEN.name==='node') html=renderNode();
  app.innerHTML=`<div class="${cls}">${html}</div>`;
  bindAll();
  if(SCREEN.name==='node'){
    const tab=SCREEN.tab||'pen';
    if(tab==='pen') setTimeout(initInfiniteCanvas,30);
    if(tab==='text') initAutoResize();
    initSecAutoResize();
  }
  if(SCREEN.name==='note') initSecAutoResize();
  GOING_BACK=false;
}

}

  return`<div class="hdr"><button class="icon-btn" id="btn-back">${I.back}</button><div class="hdr-center"><div class="hdr-title">${em?'편집 중':esc(note.title)}</div>${nodeKeys.length&&!em?`<div class="hdr-sub">서브노트 ${nodeKeys.length}개</div>`:''}</div>${hdrR}</div>
  <div class="scroll-body">${titleEl}<div class="note-meta">${fmtDate(note.createdAt)}</div><div class="divider"></div>${bodyEl}${subList}${!em?`<div style="margin-top:20px"><button class="btn btn-ghost" id="btn-del-note" style="width:100%;color:var(--danger);border-color:#fcc">${I.trash} 노트 삭제</button></div>`:''}</div>`;

            <span style="font-size:11px;color:var(--t3);white-space:nowrap">감도</span>

      ${PEN.fingerMode?`<div class="finger-banner" id="finger-banner">🖐 손가락 그리기 켜짐 — 스크롤하려면 OFF로 끄세요</div>`:`<div class="finger-banner" id="finger-banner" style="display:none">🖐 손가락 그리기 켜짐</div>`}
      <div class="canvas-scroll" id="canvas-scroll" style="touch-action:${PEN.fingerMode?'none':'auto'}">
        <div class="canvas-virtual" id="canvas-virtual">
          <canvas id="pen-canvas" style="touch-action:none"></canvas>
        </div>
      </div>
      <div class="pen-status">
        <div class="pen-dot${PEN.sPen?' on':''}" id="pen-dot"></div>
        <span id="pen-status-txt">${PEN.sPen?'S펜 연결됨 · 필압 활성':'터치/마우스 모드'}</span>
        <span style="margin-left:auto;font-size:10px" id="canvas-page-count">${Math.round(canvasH/100)}페이지</span>
      </div>
    </div>`;
  }

  // ── TEXT TAB ──
  if(tab==='text'){
    const body=node.body||'';
    const tdk=DATA.settings.textDesign||'plain';
    const td=TEXT_DESIGNS[tdk]||TEXT_DESIGNS.plain;
    const c=body.length,w=body.trim()?body.trim().split(/\s+/).length:0,l=body.split('\n').length;
    const taStyle=`font-family:${td.fontFamily};font-size:${td.fontSize};line-height:${td.lineH};color:${td.color};background:${td.bg};`;
    const memoEl=em
      ?`<textarea class="infinite-textarea" id="sub-body" style="${taStyle}" placeholder="메모를 자유롭게 입력하세요...">${esc(body)}</textarea>
       <div class="row-btns"><button class="btn btn-primary" id="btn-sub-save">${I.check} 저장</button><button class="btn btn-ghost" id="btn-sub-cancel">취소</button></div>`
      :`<div class="memo-view-wrap${!body?' empty':''}" id="sub-body-view" style="${taStyle}">${body?esc(body).replace(/\n/g,'<br>'):'탭하여 메모를 입력하세요...'}</div>
       <div style="display:flex;gap:8px;margin-top:10px">
         <button class="icon-btn" id="btn-sub-edit" style="width:auto;padding:0 14px;border-radius:8px;background:var(--bl);color:var(--blue);font-size:13px;font-weight:600;gap:5px;height:36px">${I.edit} 편집</button>
         <button class="design-pick-btn" id="btn-text-design" style="margin-left:0">${I.palette} 디자인 변경</button>
       </div>`;
    content=`<div class="text-tab-wrap">
      <div class="text-scroll" style="background:${td.bg}">
        <div class="sub-main-title">${node.num}. ${esc(node.title)}</div>
        <div class="sub-depth-label">깊이 ${depth-1}단계 · 텍스트 메모</div>
        <div class="divider" style="margin:10px 0 14px"></div>
        ${memoEl}
      </div>
      <div class="text-counter">
        <span id="text-counter">${c.toLocaleString()}자 · ${w.toLocaleString()}단어 · ${l}줄</span>
        ${em?`<span style="margin-left:auto;color:var(--blue);font-size:11px">∞ 무한 확장</span>`:`<button class="design-pick-btn" id="btn-text-design2" style="margin-left:auto;height:28px;font-size:11px">${I.palette} 메모 디자인</button>`}
      </div>
    </div>`;
  }

  // ── EXPAND TAB ──
  if(tab==='expand'){
    const expandBody=node.expandBody||'';
    const expandEm=!!SCREEN.expandEdit;
    const nodeLines=parseBody(expandBody);
    const childKeys=Object.keys(DATA.nodes).filter(k=>{if(!k.startsWith(key+'::item::'))return false;return !k.slice(key.length+'::item::'.length).includes('::');});
    let expandBodyEl='';
    if(expandEm){expandBodyEl=`<div class="tip">💡 숫자. 형식 → ${depth}단계로 확장</div><textarea class="expand-body-textarea" id="expand-body" placeholder="1. 세부항목A&#10;2. 세부항목B">${esc(expandBody)}</textarea><div class="row-btns"><button class="btn btn-primary" id="btn-expand-save">${I.check} 저장</button><button class="btn btn-ghost" id="btn-expand-cancel">취소</button></div>`;}
    else if(!nodeLines.some(l=>l.isItem&&l.text)){expandBodyEl=`<div class="empty-state" style="padding:24px 0"><div class="empty-ico" style="font-size:36px">🔗</div><p style="font-size:13px">${depth}단계로 무한 확장</p></div><button class="btn btn-primary" id="btn-expand-edit" style="width:100%">${I.expand} 하위 항목 추가</button>`;}
    else{const lh=nodeLines.map(l=>{if(l.isItem&&l.text){const ck=buildNodeKey(key,l.num);const cn=DATA.nodes[ck];const gcc=Object.keys(DATA.nodes).filter(x=>x.startsWith(ck+'::item::')).length;return`<div class="line-item"><span class="line-num">${l.num}.</span><button class="line-link" data-open-child="${ck}" data-cnum="${l.num}" data-ctext="${esc(l.text)}"><span class="link-text${cn?' has-sub':''}">${esc(l.text)}</span>${cn?`<span class="sub-badge deep">${I.expand} ${depth}단계${gcc?` +${gcc}`:''}</span>`:`<span style="font-size:11px;color:#ccc">탭 → ${depth}단계</span>`}</button></div>`;}return`<div class="line-plain">${esc(l.text)||'&nbsp;'}</div>`;}).join('');expandBodyEl=`<div>${lh}</div><div style="margin-top:10px"><button class="btn btn-ghost" id="btn-expand-edit" style="width:100%;color:var(--blue)">${I.edit} 항목 편집</button></div>`;}
    const childList=childKeys.length?`<div class="divider"></div><div style="font-size:12px;font-weight:600;color:var(--t3);margin-bottom:10px">🔗 하위 ${childKeys.length}개</div>${childKeys.map(ck=>{const cn=DATA.nodes[ck];const gcc=Object.keys(DATA.nodes).filter(x=>x.startsWith(ck+'::item::')).length;return`<div class="sub-list-item" data-open-child="${ck}" data-cnum="${cn?.num}" data-ctext="${esc(cn?.title||'')}"><div class="sli-num" style="background:#FFF3E0;color:#E65100">${cn?.num}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">${esc(cn?.title||'')}</div>${gcc?`<div style="font-size:10px;color:#E65100">하위 ${gcc}개</div>`:''}</div>${I.chev}</div>`;}).join('')}`:'';
    content=`<div class="sub-scroll"><div class="sub-main-title">${node.num}. ${esc(node.title)}</div><div class="sub-depth-label">깊이 ${depth-1}단계 → 하위 ${depth}단계</div><div class="divider" style="margin:10px 0 14px"></div>${expandBodyEl}${childList}</div>`;
  }

  // ── SECTION TAB ──
  if(tab==='section'){
    const secHtml=secs.map(s=>`<div class="sec-card"><div class="sec-hdr"><span class="sec-hdr-title">📋 ${esc(s.title)}</span><button class="icon-btn" style="width:34px;height:34px" data-del-sec="${s.id}">${I.trash}</button></div><textarea class="sec-ta" data-sec-id="${s.id}" placeholder="내용 입력...">${esc(s.content||'')}</textarea></div>`).join('');
    content=`<div class="sub-scroll"><div class="sub-main-title">${node.num}. ${esc(node.title)}</div><div class="sub-depth-label">깊이 ${depth-1}단계 · 섹션</div><div class="divider" style="margin:10px 0 14px"></div>${secHtml}<button class="add-sec-btn" id="btn-add-sec">${I.plus} 섹션 추가</button><div style="margin-top:14px"><button class="btn btn-ghost" id="btn-del-node" style="width:100%;color:var(--danger);border-color:#fcc">${I.trash} 서브노트 삭제</button></div></div>`;
  }

  return`<div class="hdr"><button class="icon-btn" id="btn-back">${I.back}</button><div class="hdr-center"><div class="hdr-title">${node.num}. ${esc(node.title)}</div><div class="hdr-sub">깊이 ${depth-1}단계</div></div><button class="sn-hdr-btn" id="btn-samsung">${I.samsung} 삼성 노트</button></div>${bc}${tabs}${content}`;
}

function showCanvasDesignPicker(ctx,W,dpr,virtual,canvas,scrollEl){
  const cur=DATA.settings.canvasDesign||'lined';
  const o=document.createElement('div');o.className='overlay';
  const items=Object.entries(CANVAS_DESIGNS).map(([k,d])=>{
    const previewCanvas=document.createElement('canvas');

    const pc=previewCanvas.getContext('2d');

    return`<div class="design-item${k===cur?' active':''}" data-dk="${k}">
      <div class="design-preview"><img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover"></div>

    </div>`;
  }).join('');

    <div class="design-grid">${items}</div>

  </div>`;
  document.body.appendChild(o);

}

function bindAll(){
  if(SCREEN.name==='home'){
    $('#fab-new')?.addEventListener('click',()=>{const id=mkId();DATA.notes[id]={id,title:'새 노트',body:'1. ',color:COLORS[0],createdAt:Date.now()};persist();nav('note',{noteId:id,editMode:true});});
    $$('[data-note]').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('[data-del-note]'))return;nav('note',{noteId:el.dataset.note});}));
    $$('[data-del-note]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();showConfirm('이 노트를 삭제할까요?',()=>{const id=btn.dataset.delNote;delete DATA.notes[id];Object.keys(DATA.nodes).filter(k=>k.startsWith(id+'::')).forEach(k=>delete DATA.nodes[k]);persist();render();});}));
    $('#btn-home-import')?.addEventListener('click',()=>importFromTxt());
  }
  if(SCREEN.name==='note'){
    $('#btn-back')?.addEventListener('click',()=>{if(SCREEN.editMode)saveNote();nav('home',{},true);});

    $('#btn-save')?.addEventListener('click',()=>{saveNote();nav('note',{noteId:SCREEN.noteId});});
    $('#btn-samsung')?.addEventListener('click',()=>showSamsungSheet('note'));
    $$('[data-open-node]').forEach(btn=>btn.addEventListener('click',()=>openNode(btn.dataset.openNode,+btn.dataset.num,btn.dataset.text)));
    $('#btn-del-note')?.addEventListener('click',()=>showConfirm('노트를 삭제할까요?',()=>{delete DATA.notes[SCREEN.noteId];Object.keys(DATA.nodes).filter(k=>k.startsWith(SCREEN.noteId+'::')).forEach(k=>delete DATA.nodes[k]);persist();nav('home',{},true);}));
  }
  if(SCREEN.name==='node'){
    $('#btn-back')?.addEventListener('click',()=>{autoSave();const p=SCREEN.nodeKey.split('::item::');if(p.length>2)nav('node',{noteId:SCREEN.noteId,nodeKey:p.slice(0,-1).join('::item::'),tab:SCREEN.tab},true);else nav('note',{noteId:SCREEN.noteId},true);});
    $$('[data-bc-note]').forEach(b=>b.addEventListener('click',()=>{autoSave();nav('note',{noteId:b.dataset.bcNote},true);}));
    $$('[data-bc-node]').forEach(b=>b.addEventListener('click',()=>{autoSave();nav('node',{noteId:b.dataset.bcNid,nodeKey:b.dataset.bcNode,tab:SCREEN.tab},true);}));
    $$('[data-tab]').forEach(b=>b.addEventListener('click',()=>{autoSave();nav('node',{...SCREEN,tab:b.dataset.tab,editMode:false,expandEdit:false});}));
    $('#btn-sub-edit')?.addEventListener('click',()=>nav('node',{...SCREEN,tab:'text',editMode:true}));
    $('#btn-sub-save')?.addEventListener('click',()=>{saveNodeBody();nav('node',{...SCREEN,editMode:false});});
    $('#btn-sub-cancel')?.addEventListener('click',()=>nav('node',{...SCREEN,editMode:false}));
    $('#sub-body-view')?.addEventListener('click',()=>nav('node',{...SCREEN,tab:'text',editMode:true}));
    $('#btn-text-design')?.addEventListener('click',()=>showTextDesignPicker());
    $('#btn-text-design2')?.addEventListener('click',()=>showTextDesignPicker());
    $('#btn-expand-edit')?.addEventListener('click',()=>nav('node',{...SCREEN,tab:'expand',expandEdit:true}));
    $('#btn-expand-save')?.addEventListener('click',()=>{saveExpandBody();nav('node',{...SCREEN,expandEdit:false});});
    $('#btn-expand-cancel')?.addEventListener('click',()=>nav('node',{...SCREEN,expandEdit:false}));
    $$('[data-open-child]').forEach(b=>b.addEventListener('click',()=>openChildNode(b.dataset.openChild,+b.dataset.cnum,b.dataset.ctext)));
    $$('[data-sec-id]').forEach(ta=>ta.addEventListener('blur',()=>{const nd=DATA.nodes[SCREEN.nodeKey];const s=(nd?.sections||[]).find(s=>s.id===ta.dataset.secId);if(s){s.content=ta.value;persist();}}));
    $$('[data-del-sec]').forEach(b=>b.addEventListener('click',()=>showConfirm('섹션을 삭제할까요?',()=>{const nd=DATA.nodes[SCREEN.nodeKey];if(nd){nd.sections=(nd.sections||[]).filter(s=>s.id!==b.dataset.delSec);persist();nav('node',{...SCREEN});}})));
    $('#btn-add-sec')?.addEventListener('click',()=>showAddSection());
    $('#btn-del-node')?.addEventListener('click',()=>showConfirm('서브노트 전체를 삭제할까요?',()=>{const k=SCREEN.nodeKey;Object.keys(DATA.nodes).filter(x=>x===k||x.startsWith(k+'::')).forEach(x=>delete DATA.nodes[x]);persist();const p=k.split('::item::');if(p.length>2)nav('node',{noteId:SCREEN.noteId,nodeKey:p.slice(0,-1).join('::item::'),tab:'expand'},true);else nav('note',{noteId:SCREEN.noteId},true);}));
    $('#btn-samsung')?.addEventListener('click',()=>{const t=SCREEN.tab||'pen';showSamsungSheet(t==='pen'?'node-pen':t==='text'?'node-text':'node-section');});

  }

function openNode(key,num,text){
  if(!DATA.nodes[key])DATA.nodes[key]={key,parentKey:SCREEN.noteId,num,title:text,body:'',expandBody:'',sections:[],strokes:[],canvasH:CANVAS_INIT_H,createdAt:Date.now()};
  else DATA.nodes[key].title=text||DATA.nodes[key].title;
  persist();nav('node',{noteId:SCREEN.noteId||key.split('::')[0],nodeKey:key,tab:'pen'});
}
function openChildNode(key,num,text){
  if(!DATA.nodes[key])DATA.nodes[key]={key,parentKey:SCREEN.nodeKey,num,title:text,body:'',expandBody:'',sections:[],strokes:[],canvasH:CANVAS_INIT_H,createdAt:Date.now()};
  else DATA.nodes[key].title=text||DATA.nodes[key].title;
  persist();nav('node',{noteId:SCREEN.noteId,nodeKey:key,tab:'pen'});
}
function saveNote(){const n=DATA.notes[SCREEN.noteId];if(!n)return;const ti=$('#note-title'),bo=$('#note-body');if(ti)n.title=ti.value.trim()||'제목 없음';if(bo)n.body=bo.value;persist();}
function saveNodeBody(){const nd=DATA.nodes[SCREEN.nodeKey];if(!nd)return;const ta=$('#sub-body');if(ta){nd.body=ta.value;persist();}}
function saveExpandBody(){const nd=DATA.nodes[SCREEN.nodeKey];if(!nd)return;const ta=$('#expand-body');if(ta){nd.expandBody=ta.value;persist();}}
function autoSave(){if(SCREEN.tab==='text')saveNodeBody();if(SCREEN.tab==='expand')saveExpandBody();$$('[data-sec-id]').forEach(ta=>{const nd=DATA.nodes[SCREEN.nodeKey];const s=(nd?.sections||[]).find(s=>s.id===ta.dataset.secId);if(s)s.content=ta.value;});persist();}

function showAddSection(){autoSave();const o=document.createElement('div');o.className='overlay';o.innerHTML=`<div class="sheet"><div class="sheet-handle"></div><p style="font-size:16px;font-weight:700;color:#111;margin-bottom:12px">섹션 추가</p><input class="field-input" id="si" placeholder="예: 담당자, 진행현황, 주요이슈, DD결과" autocomplete="off"><div class="row-btns"><button class="btn btn-ghost" id="sn">취소</button><button class="btn btn-primary" id="sy">추가</button></div></div>`;document.body.appendChild(o);const inp=o.querySelector('#si');setTimeout(()=>inp.focus(),100);o.querySelector('#sn').onclick=()=>o.remove();o.querySelector('#sy').onclick=()=>{const t=inp.value.trim();if(!t)return;const nd=DATA.nodes[SCREEN.nodeKey];if(nd){if(!nd.sections)nd.sections=[];nd.sections.push({id:mkId(),title:t,content:'',createdAt:Date.now()});persist();}o.remove();nav('node',{...SCREEN,tab:'section'});};inp.addEventListener('keydown',e=>{if(e.key==='Enter')o.querySelector('#sy').click();});o.addEventListener('click',e=>{if(e.target===o)o.remove();});}

function showToast(msg,dur=2400){const e=document.querySelector('.toast');if(e)e.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),dur);}

function buildNoteFullText(noteId){
  const note=DATA.notes[noteId];if(!note)return'';
  const sep='─'.repeat(26);
  let s=`📒 ${note.title}\n${sep}\n${fmtDate(note.createdAt)}\n\n`;
  parseBody(note.body).forEach(l=>{
    if(l.isItem&&l.text){
      s+=`${l.num}. ${l.text}\n`;
      const k=buildNodeKey(noteId,l.num),nd=DATA.nodes[k];
      if(nd?.body)s+=nd.body.split('\n').map(x=>'   '+x).join('\n')+'\n';
      if(nd?.sections?.length)nd.sections.forEach(sc=>{s+=`   [${sc.title}]\n`;if(sc.content)s+=sc.content.split('\n').map(x=>'   '+x).join('\n')+'\n';});
    }else if(l.text)s+=l.text+'\n';
  });
  return s.trim();
}

function buildNodeFullText(nodeKey){
  const nd=DATA.nodes[nodeKey];if(!nd)return'';
  let s=`${nd.num}. ${nd.title}\n${'─'.repeat(26)}\n`;
  if(nd.body)s+=nd.body+'\n';
  if(nd.sections?.length)nd.sections.forEach(sc=>{s+=`\n📋 ${sc.title}\n${sc.content||''}\n`;});
  return s.trim();
}

async function shareOrCopy(title,text){
  if(window.Android){window.Android.shareText(title,text);return;}
  if(navigator.share){try{await navigator.share({title,text});showToast('✅ 삼성 노트로 전송 완료');return;}catch(e){if(e.name==='AbortError')return;}}
  try{await navigator.clipboard.writeText(text);showToast('📋 클립보드에 복사됨');}
  catch(e){showToast('공유를 지원하지 않는 환경입니다');}
}

async function exportCanvasPNG(){
  const canvas=$('#pen-canvas');
  if(!canvas){showToast('캔버스를 먼저 열어주세요');return;}
  const nd=DATA.nodes[SCREEN.nodeKey];
  const filename=(nd?.title||'캔버스').replace(/[<>:"/\\|?*]/g,'_')+'.png';
  if(window.Android){const dataUrl=canvas.toDataURL('image/png');window.Android.shareImage(dataUrl,filename);return;}
  canvas.toBlob(async blob=>{
    if(!blob){showToast('내보내기 실패');return;}
    const file=new File([blob],filename,{type:'image/png'});
    if(navigator.share&&navigator.canShare?.({files:[file]})){
      try{await navigator.share({files:[file],title:nd?.title||'캔버스'});showToast('✅ 이미지 공유 완료');return;}
      catch(e){if(e.name==='AbortError')return;}
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    showToast('📁 이미지 저장됨 (갤러리 확인)');
  },'image/png');
}

function showImportConfirm(filename,content,onOk){
  const o=document.createElement('div');o.className='overlay';
  const prev=content.slice(0,150).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  o.innerHTML=`<div class="sheet"><div class="sheet-handle"></div>
    <p style="font-size:15px;font-weight:700;color:#111;margin-bottom:4px">📥 삼성 노트 가져오기</p>
    <p style="font-size:11px;color:var(--t3);margin-bottom:10px">${esc(filename)} · ${content.length.toLocaleString()}자</p>
    <div style="background:#F4F6FB;border-radius:9px;padding:11px 13px;font-size:12px;color:#555;line-height:1.75;margin-bottom:15px;max-height:100px;overflow:hidden">${prev}${content.length>150?'…':''}</div>
    <div class="row-btns"><button class="btn btn-ghost" id="ic-n">취소</button><button class="btn btn-primary" id="ic-y">가져오기</button></div>
  </div>`;
  document.body.appendChild(o);
  o.querySelector('#ic-n').onclick=()=>o.remove();
  o.querySelector('#ic-y').onclick=()=>{o.remove();onOk();};
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
}

function importFromTxt(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.txt,.text,.md';inp.style.display='none';
  document.body.appendChild(inp);
  inp.onchange=e=>{
    if(document.body.contains(inp))document.body.removeChild(inp);
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const content=ev.target.result;
      if(SCREEN.name==='node'){
        showImportConfirm(file.name,content,()=>{
          const nd=DATA.nodes[SCREEN.nodeKey];
          if(nd){nd.body=content;persist();nav('node',{...SCREEN,tab:'text',editMode:false});showToast('✅ 텍스트 탭에 가져왔습니다');}
        });
      }else{
        showImportConfirm(file.name,content,()=>{
          const id=mkId();
          DATA.notes[id]={id,title:file.name.replace(/\.[^.]+$/,''),body:content,color:COLORS[1],createdAt:Date.now()};
          persist();nav('note',{noteId:id});showToast('✅ 새 노트로 가져왔습니다');
        });
      }
    };
    reader.readAsText(file,'UTF-8');
  };
  inp.click();
}

  const row=(icon,bg,tc,id,title,desc)=>`<button class="samsung-item" id="${id}"><div class="si-icon" style="background:${bg};color:${tc}">${icon}</div><div><div class="si-title">${title}</div><div class="si-desc">${desc}</div></div></button>`;

         +row('📥','#E8FFF5','#059669','si-import','삼성 노트에서 가져오기','.txt 파일을 새 노트로 불러오기')
         +row('📋','#FFF8EC','#D97706','si-copy','클립보드 복사','전체 내용 복사 후 삼성 노트에 붙여넣기');
  }else if(context==='node-pen'){
    items=row('🖼️','#E8F0FF','#2563C0','si-png','캔버스 이미지 공유','PNG로 삼성 노트에 이미지 첨부')
         +row('📲','#EEF3FF','#3B5EC6','si-share','텍스트/섹션 내용 공유','메모·섹션 텍스트를 삼성 노트로')
         +row('📥','#E8FFF5','#059669','si-import','삼성 노트 텍스트 가져오기','.txt 파일을 텍스트 탭으로 불러오기');
  }else if(context==='node-text'){
    items=row('📲','#E8F0FF','#2563C0','si-share','삼성 노트로 전송','현재 텍스트 내용을 삼성 노트로 공유')
         +row('📥','#E8FFF5','#059669','si-import','삼성 노트에서 가져오기','.txt 파일을 이 탭으로 불러오기')
         +row('📋','#FFF8EC','#D97706','si-copy','클립보드 복사','텍스트를 클립보드에 복사');
  }else{
    items=row('📲','#E8F0FF','#2563C0','si-share','삼성 노트로 전송','섹션 전체 내용을 삼성 노트로 공유')
         +row('📋','#FFF8EC','#D97706','si-copy','클립보드 복사','섹션 내용을 클립보드에 복사');
  }
  o.innerHTML=`<div class="sheet"><div class="sheet-handle"></div>
    <div style="display:flex;align-items:center;gap:11px;margin-bottom:18px">
      <div style="width:38px;height:38px;background:linear-gradient(135deg,#1428A0,#4B6EF5);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">📓</div>
      <div><p style="font-size:16px;font-weight:700;color:#111;margin:0">삼성 노트 연동</p><p style="font-size:11px;color:var(--t3);margin:2px 0 0">내보내기 · 가져오기</p></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:9px">${items}</div>
    <button class="btn btn-ghost" id="ss-close" style="width:100%;margin-top:14px">닫기</button>
  </div>`;
  document.body.appendChild(o);
  o.querySelector('#ss-close').onclick=()=>o.remove();
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
  o.querySelector('#si-share')?.addEventListener('click',async()=>{
    o.remove();
    if(SCREEN.name==='note'){const note=DATA.notes[SCREEN.noteId];await shareOrCopy(note?.title||'노트',buildNoteFullText(SCREEN.noteId));}
    else{const nd=DATA.nodes[SCREEN.nodeKey];await shareOrCopy(nd?.title||'메모',buildNodeFullText(SCREEN.nodeKey));}
  });
  o.querySelector('#si-copy')?.addEventListener('click',async()=>{
    o.remove();
    const text=SCREEN.name==='note'?buildNoteFullText(SCREEN.noteId):buildNodeFullText(SCREEN.nodeKey);
    try{await navigator.clipboard.writeText(text);showToast('📋 클립보드에 복사됨');}catch(e){showToast('복사 실패');}
  });
  o.querySelector('#si-png')?.addEventListener('click',()=>{o.remove();exportCanvasPNG();});
  o.querySelector('#si-import')?.addEventListener('click',()=>{o.remove();importFromTxt();});
}

// ════════════════════════════

render();
window.addEventListener('popstate',()=>{history.pushState(null,'',location.href);if(SCREEN.name==='home')return;if(SCREEN.name==='note'){if(SCREEN.editMode)saveNote();nav('home',{},true);}else if(SCREEN.name==='node'){autoSave();const p=SCREEN.nodeKey.split('::item::');if(p.length>2)nav('node',{noteId:SCREEN.noteId,nodeKey:p.slice(0,-1).join('::item::'),tab:SCREEN.tab},true);else nav('note',{noteId:SCREEN.noteId},true);}});
history.pushState(null,'',location.href);
</script>
